apis:
  - aid: dtu:data
    name: DTU Data (Figshare API)
    description: >-
      DTU Data is DTU's institutional research data repository hosted on the
      Figshare platform. Its public datasets, articles, and metadata are
      accessible through the standard Figshare REST API v2, scoped to DTU via
      institution id 379 (e.g. /v2/articles?institution=379). Returns JSON over
      HTTPS; read access to public records requires no authentication.
    humanURL: https://data.dtu.dk/
    baseURL: https://api.figshare.com/v2
    tags: [ Research Data, Open Data, Repository, Figshare, Datasets ]
    properties:
      - type: Documentation
        url: https://docs.figshare.com/
      - type: Portal
        url: https://data.dtu.dk/
  - aid: dtu:orbit
    name: DTU Orbit Research Database (Pure)
    description: >-
      DTU Orbit is DTU's research information database (publications, projects,
      activities, researcher and department profiles), built on Elsevier Pure.
      The public web portal is openly browsable and searchable. Pure exposes a
      web service / OAI-PMH harvesting interface, but on the public DTU Orbit
      host those machine endpoints currently return errors and are not openly
      documented or self-service.
    humanURL: https://orbit.dtu.dk/
    tags: [ Research, Publications, Pure, Repository, OAI-PMH ]
    properties:
      - type: Documentation
        url: https://www.bibliotek.dtu.dk/en/about-and-contact/open-science/open-science-dtu-orbit
      - type: Portal
        url: https://orbit.dtu.dk/
