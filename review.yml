reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      DTU has no consolidated public developer portal. The one clearly live,
      documented, programmatic API is DTU Data via the Figshare REST API
      (institution=379), which returned live JSON (HTTP 200). DTU Orbit's public
      Pure portal loads fine, but its OAI/web-service endpoints redirect to an
      error page (HTTP 500) and are not openly self-service, so it is cataloged
      as a portal rather than a usable API. The dtudk GitHub org, LinkedIn
      school page, official site, and federated auth host all resolve. No
      endpoints were fabricated; the Orbit machine interface is honestly marked
      as gated/erroring.
    endpoints:
      - url: https://api.figshare.com/v2/articles?institution=379
        status: 200
        note: Live JSON of DTU Data datasets via Figshare REST API (DTU institution id 379).
      - url: https://data.dtu.dk/
        status: 202
        note: DTU Data repository portal (Figshare-hosted) reachable.
      - url: https://orbit.dtu.dk/
