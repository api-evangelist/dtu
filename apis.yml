---
aid: dtu
name: Technical University of Denmark
description: >-
  The Technical University of Denmark (DTU) is a leading engineering and science
  university in Kongens Lyngby, Denmark, ranked #109 in the QS World University
  Rankings 2025. DTU's public developer/API footprint is research- and
  metadata-oriented rather than a unified developer program: its DTU Data
  research repository is built on the Figshare platform and exposes the open
  Figshare REST API (institution id 379), and the DTU Orbit research database
  runs on Elsevier Pure. DTU also maintains a public GitHub organization
  (dtudk) hosting affiliated open-source software. Identity is handled through
  DTU's federated SSO (Shibboleth/OCES). There is no consolidated public
  developer portal documenting institution-wide APIs.
